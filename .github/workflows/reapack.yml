name: ReaPack Index
on: [push]
jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ReaPack Indexer
        run: gem install reapack-index
      - name: Generate Index
        run: reapack-index --commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}